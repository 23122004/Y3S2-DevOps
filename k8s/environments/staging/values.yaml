global:
  domain: staging.yas.local.com

product:
  backend:
    image:
      repository: DOCKERHUB_USERNAME/yas-product
      tag: latest
    resources:
      requests:
        cpu: 10m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 384Mi
    extraEnvs:
      - name: JAVA_OPTS
        value: "-Xms32m -Xmx160m -XX:MaxRAMPercentage=65.0"

