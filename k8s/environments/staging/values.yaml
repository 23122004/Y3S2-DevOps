swagger-ui:
  image:
    repository: DOCKERHUB_USERNAME/yas-swagger-ui
    tag: latest
  resources:
    requests:
      cpu: 5m
      memory: 16Mi
    limits:
      cpu: 50m
      memory: 64Mi
  ingress:
    enabled: true
    host: api.staging.yas.local.com
    hosts:
      - host: api.staging.yas.local.com
        paths:
          - path: /swagger-ui
            pathType: ImplementationSpecific
  urls: "[{ url: 'http://api.staging.yas.local.com/product/v3/api-docs', name: 'Product' },
        { url: 'http://api.staging.yas.local.com/media/v3/api-docs', name: 'Media' },
        { url: 'http://api.staging.yas.local.com/customer/v3/api-docs', name: 'Customer' }, 
        { url: 'http://api.staging.yas.local.com/cart/v3/api-docs', name: 'Cart'},
        { url: 'http://api.staging.yas.local.com/order/v3/api-docs', name: 'Order'},
        { url: 'http://api.staging.yas.local.com/inventory/v3/api-docs', name: 'Inventory'},
        { url: 'http://api.staging.yas.local.com/tax/v3/api-docs', name: 'Tax' },
        { url: 'http://api.staging.yas.local.com/search/v3/api-docs', name: 'Search'}]"
