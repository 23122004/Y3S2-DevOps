    image:
      repository: DOCKERHUB_USERNAME/yas-storefront-ui
      tag: latest
    resources:
      requests:
        cpu: 5m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 96Mi
    extraEnvs:
      - name: API_BASE_PATH
        value: "http://storefront.staging.yas.local.com/api"

backoffice-ui:
  ui:
    image:
      repository: DOCKERHUB_USERNAME/yas-backoffice-ui
      tag: latest
    resources:
      requests:
        cpu: 5m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 96Mi

storefront-bff:
  backend:
    image:
      repository: DOCKERHUB_USERNAME/yas-storefront-bff
      tag: latest
    resources:
      requests:
        cpu: 10m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 384Mi
    extraEnvs:
      - name: SPRING_PROFILES_ACTIVE
        value: prod
      - name: UI_HOST
        value: "http://storefront-ui:3000"
      - name: JAVA_OPTS
        value: "-Xms32m -Xmx160m -XX:MaxRAMPercentage=65.0"
    ingress:
      host: storefront.staging.yas.local.com

