      repository: ghcr.io/23122004/yas-media
      tag: 642495ea82b0937130e49eed933ce7cb7365c14b
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    extraEnvs:
      - name: JAVA_OPTS
        value: "-Xms32m -Xmx160m -XX:MaxRAMPercentage=65.0"
    extraObjects:
      - apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: media-pvc
        spec:
          accessModes:
            - ReadWriteOnce
          storageClassName: do-block-storage
          resources:
            requests:
              storage: 2Gi
    extraVolumes:
      - name: media-application
        configMap:
          name: media-application-configmap
      - name: media-storage
        persistentVolumeClaim:
          claimName: media-pvc
    extraVolumeMounts:
      - name: media-application
        mountPath: /opt/yas/media
      - name: media-storage
        mountPath: /images
