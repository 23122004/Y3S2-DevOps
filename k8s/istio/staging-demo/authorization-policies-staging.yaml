# Istio AuthorizationPolicies for staging namespace
# Secures all microservices while exposing Swagger docs and static media publicly.

# 1. Product Service Policy
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: product-allow-callers
  namespace: staging
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: product
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/staging/sa/order
              - cluster.local/ns/staging/sa/cart
              - cluster.local/ns/staging/sa/search
              - cluster.local/ns/staging/sa/storefront-bff
              - cluster.local/ns/staging/sa/backoffice-bff
    - to:
        - operation:
            paths:
              - /v3/api-docs

---
