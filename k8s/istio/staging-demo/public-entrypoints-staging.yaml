apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: swagger-ui-public-entrypoint
  namespace: staging
spec:
  selector:
    matchLabels: { app.kubernetes.io/name: swagger-ui }
  mtls: { mode: PERMISSIVE }
---
# Backend services reached DIRECTLY by the browser/Swagger through the NGINX
# ingress (yas-backend-apis-ingress: /product, /media, ...). NGINX has no Istio
# sidecar, so it forwards plaintext; under the namespace STRICT default those
# connections would be reset (503). PERMISSIVE lets them accept plaintext at the
# edge, while in-mesh callers still use mTLS (forced by the ISTIO_MUTUAL
# DestinationRules) and identity is still enforced by the AuthorizationPolicies.
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: product-public-entrypoint
  namespace: staging
spec:
  selector:
    matchLabels: { app.kubernetes.io/name: product }
  mtls: { mode: PERMISSIVE }
---
