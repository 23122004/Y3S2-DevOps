# Istio AuthorizationPolicies for yas namespace
# Model: default-deny by identity (mTLS SPIFFE principal) for service-to-service
# traffic, PLUS explicit "public path" allow-rules (to-only, any source) for the
# endpoints the browser/Swagger fetch straight through the NGINX ingress:
#   - every service's OpenAPI doc:   /<service>/v3/api-docs   (Swagger UI)
#   - media image files:             /media/medias*           (storefront images)
# NOTE: public paths carry the service's Spring context-path (/<service>), because
# the NGINX ingress does NOT strip the prefix before forwarding.

# 1. Product Service Policy
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: product-allow-callers
  namespace: yas
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: product
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/yas/sa/order
              - cluster.local/ns/yas/sa/cart
              - cluster.local/ns/yas/sa/search
              - cluster.local/ns/yas/sa/storefront-bff
              - cluster.local/ns/yas/sa/backoffice-bff
    - to:
        - operation:
            paths:
              - /product/v3/api-docs*

---
