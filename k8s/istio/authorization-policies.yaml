# 5. Media Service Policy
# Media image files are loaded directly by the browser (media.publicUrl points at
# the api host), so /media/medias* must be reachable from any source (plaintext ingress).
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: media-allow-callers
  namespace: yas
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: media
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/yas/sa/product
              - cluster.local/ns/yas/sa/storefront-bff
              - cluster.local/ns/yas/sa/backoffice-bff
    - to:
        - operation:
            paths:
              - /media/v3/api-docs*
              - /media/medias*

---
