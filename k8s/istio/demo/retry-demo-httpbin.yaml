# Retry demonstration backend (isolated, does not touch tax/order).
#
# httpbin exposes /status/500 which deterministically returns HTTP 500. The
# VirtualService below configures the mesh to retry 5xx up to 3 times. A single
# client request to /status/500 therefore produces 1 original + 3 retries at the
# CLIENT sidecar; prove it via the client Envoy stat:
#
#   kubectl exec -n yas mesh-tester-order -c istio-proxy -- \
#     curl -s localhost:15000/stats | grep 'httpbin.*upstream_rq_retry'
#
# The same retry semantics are already applied to the real services in
# virtual-services.yaml (tax-retry, order-retry); httpbin just makes the 500
# reproducible on demand.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin
  namespace: yas
  labels: { app: httpbin }
spec:
  replicas: 1
  selector:
    matchLabels: { app: httpbin }
  template:
    metadata:
      labels: { app: httpbin }
      annotations: { sidecar.istio.io/inject: "true" }
    spec:
      containers:
        - name: httpbin
          image: mccutchen/go-httpbin:v2.15.0
          ports: [{ containerPort: 8080 }]
          env:
            - { name: PORT, value: "8080" }
          resources:
            requests: { cpu: "10m", memory: "24Mi" }
            limits:   { cpu: "100m", memory: "64Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin
  namespace: yas
  labels: { app: httpbin }
spec:
  selector: { app: httpbin }
  ports:
    - name: http
      port: 8000
      targetPort: 8080
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: httpbin-retry
  namespace: yas
spec:
  hosts:
    - httpbin.yas.svc.cluster.local
  http:
    - retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: 5xx,reset,connect-failure,retriable-4xx
      route:
        - destination:
            host: httpbin
            port:
              number: 8000
