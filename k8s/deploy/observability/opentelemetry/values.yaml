opentelemetryCollectorConfig:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
  processors:
    batch: {}
  exporters:
    debug:
      verbosity: detailed
    otlphttp/loki:
      endpoint: http://loki-gateway
      tls:
        insecure: true
    otlphttp:
      endpoint: http://tempo:4318
      tls:
        insecure: true
    prometheusremotewrite:
      endpoint: http://prometheus-operated.observability.svc.cluster.local:9090/api/v1/write
      resource_to_telemetry_conversion:
        enabled: true
  service:
    pipelines:
      logs:
        receivers: [otlp]
        processors: [batch]
        exporters: [otlphttp/loki]
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [otlphttp]
      metrics:
        receivers: [otlp]
        processors: [batch]
        exporters: [prometheusremotewrite]
    telemetry:
      metrics:
        address: 0.0.0.0:8889