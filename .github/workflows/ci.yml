name: CI - Build Docker Hub Images

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: product
            context: product
            image: yas-product
          - service: cart
            context: cart
            image: yas-cart
          - service: order
            context: order
            image: yas-order
          - service: customer
            context: customer
            image: yas-customer
          - service: inventory
            context: inventory
            image: yas-inventory
          - service: tax
            context: tax
            image: yas-tax
          - service: media
            context: media
            image: yas-media
          - service: search
            context: search
            image: yas-search
          - service: storefront-bff
            context: storefront-bff
            image: yas-storefront-bff
          - service: storefront-ui
            context: storefront
            image: yas-storefront-ui
          - service: backoffice-bff
            context: backoffice-bff
            image: yas-backoffice-bff
          - service: backoffice-ui
            context: backoffice
            image: yas-backoffice-ui
          - service: sampledata
            context: sampledata
            image: yas-sampledata
          - service: swagger-ui
            context: swagger-ui
            image: yas-swagger-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image tags
        id: tags
        shell: bash
        run: |
          image="${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}"
          tags="${image}:${{ github.sha }}"
          safe_branch="$(echo "${{ github.ref_name }}" | tr '/_' '--' | tr -cd '[:alnum:].-')"
          tags="${tags},${image}:${safe_branch}"
          if [ "${{ github.ref_name }}" = "main" ]; then
            tags="${tags},${image}:latest"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.context }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

